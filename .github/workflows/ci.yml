name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      users: ${{ steps.filter.outputs.users }}
      authorizer: ${{ steps.filter.outputs.authorizer }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v7

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            users:
              - 'src/functions/users/**'
            authorizer:
              - 'src/functions/authorizer/**'
            infra:
              - 'infrastructure/**'

  test-users:
    name: Test Users Lambda
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.users == 'true'
    defaults:
      run:
        working-directory: src/functions/users
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/functions/users/target
          key: ${{ runner.os }}-cargo-users-${{ hashFiles('src/functions/users/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-users-

      - name: Run tests
        run: cargo test --all-features

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-features -- -D warnings

  test-authorizer:
    name: Test Authorizer Lambda
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.authorizer == 'true'
    defaults:
      run:
        working-directory: src/functions/authorizer
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/functions/authorizer/target
          key: ${{ runner.os }}-cargo-authorizer-${{ hashFiles('src/functions/authorizer/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-authorizer-

      - name: Run tests
        run: cargo test --all-features

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-features -- -D warnings

  build-lambdas:
    name: Build Lambda Packages
    runs-on: ubuntu-latest
    needs: [detect-changes, test-users, test-authorizer]
    if: |
      always() &&
      (needs.detect-changes.outputs.users == 'true' || needs.detect-changes.outputs.authorizer == 'true') &&
      (needs.test-users.result == 'success' || needs.test-users.result == 'skipped') &&
      (needs.test-authorizer.result == 'success' || needs.test-authorizer.result == 'skipped')
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/functions/users/target
            src/functions/authorizer/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('src/functions/*/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-build-

      - name: Install cargo-lambda
        run: pip install cargo-lambda

      - name: Build Users Lambda
        if: needs.detect-changes.outputs.users == 'true'
        run: |
          cd src/functions/users
          cargo lambda build --release --arm64

      - name: Build Authorizer Lambda
        if: needs.detect-changes.outputs.authorizer == 'true'
        run: |
          cd src/functions/authorizer
          cargo lambda build --release --arm64

      - name: Package artifacts
        run: |
          mkdir -p "$GITHUB_WORKSPACE/infrastructure/dist"
          if [ -f src/functions/users/target/lambda/users-lambda/bootstrap ]; then
            cd src/functions/users/target/lambda/users-lambda
            zip "$GITHUB_WORKSPACE/infrastructure/dist/users-lambda.zip" bootstrap
          fi
          if [ -f "$GITHUB_WORKSPACE/src/functions/authorizer/target/lambda/authorizer-lambda/bootstrap" ]; then
            cd "$GITHUB_WORKSPACE/src/functions/authorizer/target/lambda/authorizer-lambda"
            zip "$GITHUB_WORKSPACE/infrastructure/dist/authorizer-lambda.zip" bootstrap
          fi

      - name: Upload Lambda artifacts
        uses: actions/upload-artifact@v7
        with:
          name: lambda-packages
          path: infrastructure/dist/*.zip
          retention-days: 5

  validate-infra:
    name: Validate Infrastructure
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.infra == 'true'
    defaults:
      run:
        working-directory: infrastructure
    steps:
      - uses: actions/checkout@v7

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.7"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive modules/

      - name: Create placeholder zips for validation
        run: |
          mkdir -p dist
          touch /tmp/bootstrap
          zip dist/users-lambda.zip /tmp/bootstrap
          zip dist/authorizer-lambda.zip /tmp/bootstrap

      - name: Terraform Validate Module
        run: |
          cd modules/workshop
          terraform init -backend=false
          terraform validate
