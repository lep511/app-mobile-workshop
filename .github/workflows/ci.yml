name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test-users:
    name: Test Users Lambda
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/functions/users
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/functions/users/target
          key: ${{ runner.os }}-cargo-users-${{ hashFiles('src/functions/users/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-users-

      - name: Run tests
        run: cargo test --all-features

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-features -- -D warnings

  test-authorizer:
    name: Test Authorizer Lambda
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/functions/authorizer
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/functions/authorizer/target
          key: ${{ runner.os }}-cargo-authorizer-${{ hashFiles('src/functions/authorizer/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-authorizer-

      - name: Run tests
        run: cargo test --all-features

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-features -- -D warnings

  build-lambdas:
    name: Build Lambda Packages
    runs-on: ubuntu-latest
    needs: [test-users, test-authorizer]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/functions/users/target
            src/functions/authorizer/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('src/functions/*/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-build-

      - name: Install cargo-lambda
        run: pip install cargo-lambda

      - name: Build Users Lambda
        run: |
          cd src/functions/users
          cargo lambda build --release --arm64

      - name: Build Authorizer Lambda
        run: |
          cd src/functions/authorizer
          cargo lambda build --release --arm64

      - name: Package artifacts
        run: |
          mkdir -p infrastructure/dist
          cd src/functions/users/target/lambda/users-lambda
          zip /home/runner/work/app-mobile/app-mobile/infrastructure/dist/users-lambda.zip bootstrap
          cd /home/runner/work/app-mobile/app-mobile/src/functions/authorizer/target/lambda/authorizer-lambda
          zip /home/runner/work/app-mobile/app-mobile/infrastructure/dist/authorizer-lambda.zip bootstrap

      - name: Upload Lambda artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lambda-packages
          path: infrastructure/dist/*.zip
          retention-days: 5

  validate-infra:
    name: Validate Infrastructure
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.7"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive modules/

      - name: Terraform Validate Module
        run: |
          cd modules/workshop
          terraform init -backend=false
          terraform validate
