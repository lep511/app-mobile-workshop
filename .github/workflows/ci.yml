name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test-users:
    name: Test Users Lambda
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/functions/users
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/functions/users/target
          key: ${{ runner.os }}-cargo-users-${{ hashFiles('src/functions/users/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-users-

      - name: Run tests
        run: cargo test --all-features

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-features -- -D warnings

  test-authorizer:
    name: Test Authorizer Lambda
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/functions/authorizer
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/functions/authorizer/target
          key: ${{ runner.os }}-cargo-authorizer-${{ hashFiles('src/functions/authorizer/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-authorizer-

      - name: Run tests
        run: cargo test --all-features

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-features -- -D warnings

  validate-infra:
    name: Validate Infrastructure
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure
    steps:
      - uses: actions/checkout@v7

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.7"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive modules/

      - name: Create placeholder zips for validation
        run: |
          mkdir -p dist
          touch /tmp/bootstrap
          zip dist/users-lambda.zip /tmp/bootstrap
          zip dist/authorizer-lambda.zip /tmp/bootstrap

      - name: Terraform Validate Module
        run: |
          cd modules/workshop
          terraform init -backend=false
          terraform validate
