name: Deploy Lambdas (per environment)

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      deploy-users:
        required: true
        type: boolean
      deploy-authorizer:
        required: true
        type: boolean

env:
  CARGO_TERM_COLOR: always

jobs:
  deploy-users:
    name: Users Lambda (${{ inputs.environment }})
    if: inputs.deploy-users
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: src/functions/users
    env:
      AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/functions/users/target
          key: ${{ runner.os }}-cargo-users-${{ hashFiles('src/functions/users/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-users-

      - name: Install cargo-lambda
        run: pip install cargo-lambda

      - name: Build
        run: cargo lambda build --release --arm64

      - name: Configure session token
        run: |
          if [ -n "$SESSION_TOKEN" ]; then
            echo "AWS_SESSION_TOKEN=$SESSION_TOKEN" >> "$GITHUB_ENV"
          fi
        env:
          SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Deploy
        run: cargo lambda deploy --binary-name users-lambda ${{ vars.USERS_LAMBDA_FUNCTION_NAME }}

  deploy-authorizer:
    name: Authorizer Lambda (${{ inputs.environment }})
    if: inputs.deploy-authorizer
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: src/functions/authorizer
    env:
      AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/functions/authorizer/target
          key: ${{ runner.os }}-cargo-authorizer-${{ hashFiles('src/functions/authorizer/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-authorizer-

      - name: Install cargo-lambda
        run: pip install cargo-lambda

      - name: Build
        run: cargo lambda build --release --arm64

      - name: Configure session token
        run: |
          if [ -n "$SESSION_TOKEN" ]; then
            echo "AWS_SESSION_TOKEN=$SESSION_TOKEN" >> "$GITHUB_ENV"
          fi
        env:
          SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Deploy
        run: cargo lambda deploy --binary-name authorizer-lambda ${{ vars.AUTHORIZER_LAMBDA_FUNCTION_NAME }}
