name: Deploy Lambda Functions

on:
  push:
    branches: [main]
    paths:
      - "src/functions/**"
      - ".github/workflows/deploy-lambdas.yml"
      - ".github/workflows/deploy-lambdas-env.yml"
  workflow_dispatch:
    inputs:
      deploy-users:
        description: "Deploy Users Lambda"
        type: boolean
        default: true
      deploy-authorizer:
        description: "Deploy Authorizer Lambda"
        type: boolean
        default: true
      run-integration-tests:
        description: "Run integration tests after dev deploy"
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        function: [users, authorizer]
    defaults:
      run:
        working-directory: src/functions/${{ matrix.function }}
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/functions/${{ matrix.function }}/target
          key: ${{ runner.os }}-cargo-${{ matrix.function }}-${{ hashFiles(format('src/functions/{0}/Cargo.lock', matrix.function)) }}
          restore-keys: ${{ runner.os }}-cargo-${{ matrix.function }}-

      - name: Run tests
        run: cargo test --all-features

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-features -- -D warnings

  deploy-dev:
    name: Deploy to Dev
    needs: unit-tests
    uses: ./.github/workflows/deploy-lambdas-env.yml
    with:
      environment: dev
      deploy-users: ${{ github.event_name != 'workflow_dispatch' || inputs.deploy-users }}
      deploy-authorizer: ${{ github.event_name != 'workflow_dispatch' || inputs.deploy-authorizer }}
    secrets: inherit

  integration-tests:
    name: Integration Tests (Dev)
    needs: deploy-dev
    if: github.event_name != 'workflow_dispatch' || inputs.run-integration-tests
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v7

      - name: Run integration tests
        env:
          API_URL: ${{ vars.API_GATEWAY_STAGE_URL }}
          COGNITO_CLIENT_ID: ${{ vars.COGNITO_CLIENT_ID }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          AWS_REGION: ${{ vars.AWS_DEFAULT_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          chmod +x tests/integration/test_users_lambda.sh
          tests/integration/test_users_lambda.sh

  deploy-prod:
    name: Deploy to Prod
    needs: integration-tests
    if: always() && !failure() && !cancelled()
    uses: ./.github/workflows/deploy-lambdas-env.yml
    with:
      environment: prod
      deploy-users: ${{ github.event_name != 'workflow_dispatch' || inputs.deploy-users }}
      deploy-authorizer: ${{ github.event_name != 'workflow_dispatch' || inputs.deploy-authorizer }}
    secrets: inherit
