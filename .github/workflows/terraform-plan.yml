name: Terraform Plan

on:
  pull_request:
    paths:
      - "infrastructure/**"

env:
  TF_CLOUD_ORGANIZATION: "lep511"
  TF_API_TOKEN: "${{ secrets.TF_API_TOKEN }}"
  TF_STACK: "stack-mobile-app-v2"
  TF_PROJECT: "workshop-app-mobile"
  CONFIG_DIRECTORY: "infrastructure"

jobs:
  plan:
    name: Terraform Plan (Stacks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.7"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        working-directory: ${{ env.CONFIG_DIRECTORY }}
        run: terraform stacks init

      - name: Terraform Format Check
        working-directory: ${{ env.CONFIG_DIRECTORY }}
        run: terraform fmt -check -recursive modules/

      - name: Validate Module
        working-directory: ${{ env.CONFIG_DIRECTORY }}/modules/workshop
        run: |
          terraform init -backend=false
          terraform validate

      - name: Upload Configuration (Speculative)
        id: upload
        working-directory: ${{ env.CONFIG_DIRECTORY }}
        run: |
          OUTPUT=$(terraform stacks configuration upload \
            -organization-name "$TF_CLOUD_ORGANIZATION" \
            -project-name "$TF_PROJECT" \
            -stack-name "$TF_STACK" 2>&1) || true
          echo "upload_output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT"

      - name: Comment on PR
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes('Terraform Stacks Plan')
            );
            const output = `#### Terraform Stacks Plan

            Configuration uploaded to HCP Terraform Stack \`${{ env.TF_STACK }}\`.

            **Organization:** \`${{ env.TF_CLOUD_ORGANIZATION }}\`
            **Project:** \`${{ env.TF_PROJECT }}\`
            **Stack:** \`${{ env.TF_STACK }}\`

            View the plan in [HCP Terraform](https://app.terraform.io/app/${{ env.TF_CLOUD_ORGANIZATION }}/projects/prj-Ybw6DA7aRAC8LSAq/stacks/st-kM5CMNrT3yW65Bvi).

            <details><summary>Upload Output</summary>

            \`\`\`
            ${{ steps.upload.outputs.upload_output }}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*
            `;

            if (botComment) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
              });
            }
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output,
            });
